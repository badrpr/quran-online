<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Quran Online | Lecture du Coran Premium</title>
    <meta name="description" content="Lisez le Saint Coran en ligne avec traductions et audio dans une interface moderne et élégante.">

    <!-- Open Graph / WhatsApp / Twitter -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Al-Quran Online | Lecture du Coran Premium">
    <meta property="og:description" content="Lisez les 114 sourates avec traductions FR/EN et écoute audio — interface moderne et élégante.">
    <meta property="og:locale" content="fr_FR">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Al-Quran Online">
    <meta name="twitter:description" content="Lisez les 114 sourates avec traductions FR/EN et écoute audio.">
    <meta name="theme-color" content="#065f46">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <!-- Preconnect to API origin to reduce DNS + TLS overhead -->
    <link rel="preconnect" href="https://api.alquran.cloud" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.islamic.network">
    <link rel="preconnect" href="https://cdn.alquran.cloud" crossorigin>
    <link href="https://alquran.cloud/public/css/font-all.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Apply saved theme before paint to avoid flash -->
    <script>
        (function(){try{var t=localStorage.getItem('theme');if(t==='"light"')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();
    </script>
</head>
<body>
    <nav class="glass-nav" id="main-nav" role="navigation" aria-label="Navigation principale">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
            <a href="#" class="logo" id="home-btn">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                </div>
                <span class="logo-text">Al-Quran</span>
            </a>
            <div id="nav-actions" style="margin-left: auto; display: flex; align-items: center;">
                <button id="theme-toggle-btn" class="nav-icon-btn" aria-label="Changer le thème">
                    <svg id="theme-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </button>
                <button id="stats-nav-btn" class="nav-icon-btn" aria-label="Statistiques">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    <span id="stats-nav-label">Stats</span>
                </button>
                <button id="reminder-btn" class="nav-icon-btn" aria-label="Rappel quotidien">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <span id="reminder-nav-label">Rappel</span>
                </button>
                <button id="bookmarks-nav-btn" class="nav-icon-btn" aria-label="Favoris">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    <span id="bookmarks-nav-label">Favoris</span>
                </button>
                <div id="lang-selector-container"></div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div id="app-view">
            <!-- Dynamic content will be injected here -->
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <button id="scroll-top-btn" aria-label="Retour en haut">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <footer class="site-footer" role="contentinfo">
        <div class="container">
            <p>Données fournies par <a href="https://alquran.cloud" target="_blank" rel="noopener noreferrer">Al Quran Cloud API</a></p>
            <p class="footer-version">Al-Quran Online v1.0 &mdash; open source</p>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>
</html>
